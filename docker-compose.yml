services:
  api-1:
    build:
      context: .
      dockerfile: src/CrudCsharpPractice.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AppSettings:Port=8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-2:
    build:
      context: .
      dockerfile: src/CrudCsharpPractice.Api/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - AppSettings:Port=8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-3:
    build:
      context: .
      dockerfile: src/CrudCsharpPractice.Api/Dockerfile
    ports:
      - "8082:8080"
    environment:
      - AppSettings:Port=8080
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-1
      - api-2
      - api-3
